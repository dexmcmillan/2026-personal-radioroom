server {
    listen 80;
    server_name _;

    root /opt/policescout/docs;
    index index.html;

    # HTML: no cache so users always get the latest build
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # data.json: short cache (updated every hour for TPS, daily for press releases)
    location = /data.json {
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
